spring:
  application:
    name: restaurant-ordering

  datasource:
    url: jdbc:mysql://localhost:3306/restaurant_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  sql:
    init:
      mode: never
      schema-locations: classpath:schema-mysql.sql
      data-locations: classpath:data-mysql.sql
      continue-on-error: true

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  redis:
    host: localhost
    port: 6379
    password:
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

  cache:
    type: none
    redis:
      time-to-live: 600000 # 10分钟
      cache-null-values: false

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    com.restaurant.ordering: DEBUG
    org.springframework.web: INFO
  file:
    name: logs/application.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30

file:
  upload-dir: uploads
  base-url: http://localhost:8080/api

jwt:
  secret: ${JWT_SECRET:your-jwt-secret-key-change-in-production}
  expiration: 3600000  # 1小时 = 3600000ms

wechat:
  miniapp:
    app-id: ${WECHAT_APP_ID:wxba5a6b871bc045bc}
    secret: ${WECHAT_APP_SECRET:b563640ca8daebbe15aa6bf8390bcbb0}
    mch-id: ${WECHAT_MCH_ID:your-mch-id}
    mch-key: ${WECHAT_MCH_KEY:your-mch-key}
    key-path: ${WECHAT_KEY_PATH:classpath:cert/apiclient_cert.p12}
    notify-url: ${WECHAT_NOTIFY_URL:https://your-domain.com/api/payment/callback}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method