spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:restaurant_db}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:restaurant_user}
    password: ${DB_PASSWORD:restaurant_password}

  redis:
    host: ${REDIS_HOST:redis}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

logging:
  level:
    com.restaurant.ordering: DEBUG
    org.springframework.web: INFO