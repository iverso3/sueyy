spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:restaurant_db}?useUnicode=true&characterEncoding=UTF-8&useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:restaurant_user}
    password: ${DB_PASSWORD:restaurant_password}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10

  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    timeout: 10000ms
    lettuce:
      pool:
        max-active: 20
        max-idle: 10

  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    com.restaurant.ordering: INFO
    org.springframework: WARN
  file:
    name: /app/logs/application.log
  logback:
    rollingpolicy:
      max-file-size: 50MB
      max-history: 90

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

file:
  base-url: https://wuvhkxpiwyfu.sealosgzg.site/api
  upload-dir: /app/uploads

wechat:
  miniapp:
    app-id: ${WECHAT_APP_ID:wxba5a6b871bc045bc}
    secret: ${WECHAT_APP_SECRET:b563640ca8daebbe15aa6bf8390bcbb0}