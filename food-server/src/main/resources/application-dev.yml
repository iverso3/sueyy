spring:
  datasource:
    url: jdbc:mysql://localhost:3306/restaurant_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: restaurant_user
    password: restaurant_password

  redis:
    host: localhost
    port: 6379

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.restaurant.ordering: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type: TRACE